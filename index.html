<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gündem | Mobil Haber</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-top">
                <h2>Gündem<span>Haber</span></h2>
                <button onclick="toggleDarkMode()" id="dark-mode-btn" title="Karanlık Mod">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            <nav id="categories">
                <button class="active" onclick="filterNews('Hepsi', this)">Hepsi</button>
                <button onclick="filterNews('Teknoloji', this)">Teknoloji</button>
                <button onclick="filterNews('Spor', this)">Spor</button>
                <button onclick="filterNews('Magazin', this)">Magazin</button>
            </nav>
        </header>

        <main id="news-container">
            </main>

        <div id="news-detail" class="detail-page hidden">
            <div class="detail-header">
                <button onclick="closeDetail()" class="back-btn"><i class="fas fa-arrow-left"></i> Geri</button>
                <button id="fav-btn" class="fav-btn"><i class="far fa-bookmark"></i></button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
